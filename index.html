<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AVID Upload Portal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      text-align: center;
    }

    /* Banner */
    .banner {
      background: #0b3d91;
      color: white;
      padding: 30px 20px;
    }

    .logo {
      width: 70px;
      height: 70px;
      background: white;
      border-radius: 50%;
      margin: 0 auto 10px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #0b3d91;
      font-size: 20px;
    }

    h1 {
      margin: 10px 0 5px 0;
      font-size: 26px;
    }

    p {
      margin: 0;
      font-size: 14px;
      opacity: 0.9;
    }

    /* Upload box */
    .container {
      margin-top: 40px;
      background: white;
      display: inline-block;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .note {
      font-size: 12px;
      color: gray;
      margin-top: 10px;
      max-width: 300px;
    }

</head>

<body>

  </div>

  <!-- Upload Section -->
  <div class="container">
    <h2>Upload Your Photos</h2>

    <script>
      UPLOADCARE_PUBLIC_KEY = "1f824a36818cadf5ede3";
    </script>

    <input type="hidden" role="uploadcare-uploader" />

    <div class="note">
      ⚠️ File limit: images only (JPG, PNG). Max size depends on upload service limits. Please avoid inappropriate or unrelated content.
    </div>
