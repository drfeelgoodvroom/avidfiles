<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Salinas High AVID Portal</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f6f8fb;
    color: #1f2937;
  }

  /* HEADER */
  .header {
    background: #003262;
    color: white;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 40px;
    height: 40px;
    background: #FDB515;
    color: #003262;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    border-radius: 8px;
  }

  .header-text {
    line-height: 1.2;
  }

  .header-text b {
    display: block;
    font-size: 14px;
    letter-spacing: 0.3px;
  }

  .header-text span {
    font-size: 12px;
    opacity: 0.85;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 35px 20px 10px;
  }

  .hero h1 {
    margin: 0;
    color: #003262;
    font-size: 26px;
  }

  .hero p {
    color: #6b7280;
    font-size: 14px;
  }

  /* UPLOAD CARD */
  .card {
    max-width: 420px;
    margin: 25px auto;
    background: white;
    padding: 24px;
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    border-top: 4px solid #FDB515;
    text-align: center;
  }

  .note {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 12px;
    line-height: 1.4;
  }

  /* GALLERY */
  .gallery {
    max-width: 1100px;
    margin: 30px auto;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
  }

  .gallery img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
  }

  .gallery img:hover {
    transform: scale(1.03);
  }

  /* FOOTER */
  .footer {
    text-align: center;
    font-size: 11px;
    color: #9ca3af;
    margin: 30px;
  }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">AV</div>
  <div class="header-text">
    <b>Salinas High School AVID Portal</b>
    <span>University-style photo upload system</span>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Upload Your AVID Memories</h1>
  <p>Class archive • Salinas High School</p>
</div>

<!-- UPLOAD -->
<div class="card">

  <script>
    UPLOADCARE_PUBLIC_KEY = "1f824a36818cadf5ede3";
  </script>

  <input type="hidden" role="uploadcare-uploader" id="uploader"/>

  <div class="note">
    Upload JPG or PNG images only.<br/>
    Please keep content school-appropriate.
  </div>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>

<div class="footer">
  AVID 27 • Salinas High School
</div>

<script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>

<script>
  const gallery = document.getElementById("gallery");
  const widget = uploadcare.Widget("[role=uploadcare-uploader]");

  widget.onUploadComplete(function(fileInfo) {
    const url = fileInfo.cdnUrl;

    const img = document.createElement("img");
    img.src = url;

    img.onclick = () => window.open(url, "_blank");

    gallery.prepend(img);
  });
</script>

</body>
</html>
