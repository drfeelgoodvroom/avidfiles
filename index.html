<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AVID Yearbook Portal</title>

<style>
  /* UC-STYLE FONT STACK */
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f6f8fb;
    color: #1f2937;
  }

  /* HEADER */
  .header {
    background: #003262;
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    width: 40px;
    height: 40px;
    background: #FDB515;
    color: #003262;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
  }

  .title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  /* YEARBOOK TOGGLE */
  .toggle {
    background: #FDB515;
    color: #003262;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 30px 15px 10px;
  }

  .hero h1 {
    margin: 0;
    color: #003262;
    font-size: 24px;
    font-weight: 700;
  }

  .hero p {
    margin-top: 6px;
    color: #6b7280;
    font-size: 13px;
  }

  /* UPLOAD CARD */
  .card {
    max-width: 420px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    border-top: 4px solid #FDB515;
    text-align: center;
  }

  .note {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 10px;
  }

  /* GALLERY GRID MODE */
  .gallery {
    max-width: 1100px;
    margin: 25px auto;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
  }

  .gallery img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
  }

  .gallery img:hover {
    transform: scale(1.03);
  }

  /* 📖 YEARBOOK MODE */
  .yearbook .gallery {
    grid-template-columns: 1fr;
    max-width: 700px;
  }

  .yearbook .entry {
    display: flex;
    gap: 12px;
    background: white;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    align-items: center;
  }

  .yearbook img {
    width: 90px;
    height: 90px;
    border-radius: 10px;
  }

  .name {
    font-size: 13px;
    font-weight: 600;
    color: #003262;
  }

  .sub {
    font-size: 11px;
    color: #6b7280;
  }

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <div class="logo">AV</div>
    <div class="title">Salinas High AVID Portal</div>
  </div>

  <button class="toggle" onclick="toggleMode()">Yearbook Mode</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>AVID Photo Archive</h1>
  <p>Upload memories • Class of 2026</p>
</div>

<!-- UPLOAD -->
<div class="card">
  <script>
    UPLOADCARE_PUBLIC_KEY = "1f824a36818cadf5ede3";
  </script>

  <input type="hidden" role="uploadcare-uploader" />

  <div class="note">
    JPG/PNG only • School-appropriate content
  </div>
</div>

<!-- GALLERY -->
<div id="container">
  <div class="gallery" id="gallery"></div>
</div>

<script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>

<script>
  const gallery = document.getElementById("gallery");
  const container = document.getElementById("container");

  let yearbook = false;

  const widget = uploadcare.Widget("[role=uploadcare-uploader]");

  widget.onUploadComplete(function(fileInfo) {
    const url = fileInfo.cdnUrl;

    addImage(url, "Student", "AVID 2026");
  });

  function addImage(url, name, sub) {
    if (!yearbook) {
      const img = document.createElement("img");
      img.src = url;
      img.onclick = () => window.open(url, "_blank");
      gallery.prepend(img);
    } else {
      const div = document.createElement("div");
      div.className = "entry";

      div.innerHTML = `
        <img src="${url}" />
        <div>
          <div class="name">${name}</div>
          <div class="sub">${sub}</div>
        </div>
      `;

      gallery.prepend(div);
    }
  }

  function toggleMode() {
    yearbook = !yearbook;

    if (yearbook) {
      container.classList.add("yearbook");
    } else {
      container.classList.remove("yearbook");
    }
  }
</script>

</body>
</html>
